name: Push to Docker Hub
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy-container:
    name: Build and deploy Docker Hub container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Publish to Docker Hub
        uses: docker/build-push-action@v5
        with:
          push: true
          no-cache: true
          tags: jackbruzan/boom:latest, jackbruzan/boom:${{github.run_number}}
          build-args: |
            NUXT_PUBLIC_SUPABASE_URL=${{secrets.NUXT_PUBLIC_SUPABASE_URL}}
            NUXT_PUBLIC_SUPABASE_KEY=${{secrets.NUXT_PUBLIC_SUPABASE_KEY}}
            NUXT_PUBLIC_DISCORD_INVITE_URL=${{secrets.NUXT_PUBLIC_DISCORD_INVITE_URL}}
            NUXT_PUBLIC_STRIPE_PRICE_ID_SINGLE=${{secrets.NUXT_PUBLIC_STRIPE_PRICE_ID_SINGLE}}
            NUXT_PUBLIC_STRIPE_PRICE_ID_FIVE_PACK=${{secrets.NUXT_PUBLIC_STRIPE_PRICE_ID_FIVE_PACK}}
